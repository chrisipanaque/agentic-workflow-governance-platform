name: agentic-workflow-governance-tools CI

on:
  push: 
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Test healthcheck
        run: ./build/agentic-workflow-governance-tools healthcheck

      - name: Test show-policies
        run: timeout 30 ./build/agentic-workflow-governance-tools show-policies

      - name: Test scan-diff
        run: |
          cd build
          git init
          git config user.email "chris.ipanaque@gmail.com"
          git config user.name "chrisipanaque"
          echo "initial content" > test.txt
          git add test.txt
          git commit -m "initial"
          echo "modified content" > test.txt
          echo "new file" > newfile.txt
          ../build/agentic-workflow-governance-tools scan-diff
          cd ..

      - name: Test validate-policy
        run: ./build/agentic-workflow-governance-tools validate-policy

      - name: Test validate-dependencies
        run: timeout 30 ./build/agentic-workflow-governance-tools validate-dependencies

      - name: Upload logs and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-and-traces
          path: |
            output/traces/
            output/reports/
